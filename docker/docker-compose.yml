services:
  postgres:
    image: postgis/postgis:15-3.3
    container_name: loadkaro-db
    environment:
      POSTGRES_USER: loadkaro
      POSTGRES_PASSWORD: loadkaro
      POSTGRES_DB: loadkaro
    command: postgres -c max_connections=200 -c shared_buffers=256MB
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U loadkaro"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - loadkaro-net

  redis:
    image: redis:7-alpine
    container_name: loadkaro-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - loadkaro-net

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: loadkaro-api
    environment:
      DATABASE_URL: postgresql+asyncpg://loadkaro:loadkaro@postgres:5432/loadkaro
      REDIS_URL: redis://redis:6379
      ENVIRONMENT: production
      DEBUG: "false"
      LOG_LEVEL: info
      HOST: 0.0.0.0
      PORT: 8000
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - loadkaro-net
    restart: unless-stopped
    command: sh -c "python -m core.setup_db && uvicorn app:app --host 0.0.0.0 --port 8000"

  nginx:
    image: nginx:alpine
    container_name: loadkaro-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
    networks:
      - loadkaro-net
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  loadkaro-net:
    driver: bridge
